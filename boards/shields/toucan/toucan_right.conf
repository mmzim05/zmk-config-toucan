CONFIG_ZMK_POINTING=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fastest BLE connection interval (7.5ms), no skipped events — prevents trackpad
# events from batching over BLE which causes cursor teleport on finger lift
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Blink built-in LED at 1 Hz — if blinking stops, MCU crashed; if BLE drops but
# blinking continues, the fault is in the BLE link not the MCU
CONFIG_ZMK_HEARTBEAT_LED=y

# The pinnacle driver also requires this to include sleep code
CONFIG_ZMK_MOUSE=y

CONFIG_ZMK_BATTERY_REPORTING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Required to include the touchpad autosleep code.  This saves *lots* of power during use
# but IMO the user experience feels not so great because quite often when you go to use the touchpad
# you need to wait ~300ms for it to wake up.  So for now I'm leaving it off.  I think with just my 
# shutdown mode power savings are probably adequate
# CONFIG_ZMK_INPUT_PINNACLE_IDLE_SLEEPER=y

# Enter deep sleep https://zmk.dev/docs/features/low-power-states
CONFIG_ZMK_SLEEP=y

# Defaults to 15 minutes but 60 minutes is only very slightly more power draw and user experience is much better to not
# have keyboard go to deep sleep (i.e. having to reconenect to bluetooth)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

CONFIG_ZMK_IDLE_TIMEOUT=30000

# We use this because we need ZMK_PM, PM_DEVICE and ZMK_PM_DEVICE_SUSPEND_RESUME to get proper sleep notifications into the cirque driver
# since we need all that might as well also turn on SOFT_OFF (which implies all these things but adds an optional SOFT_OFF feature)
CONFIG_ZMK_PM_SOFT_OFF=y
