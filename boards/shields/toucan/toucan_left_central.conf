CONFIG_ZMK_MOUSE=y

# Request 7.5ms BLE connection interval from the PC (central acts as peripheral to host)
# Cuts HID report latency from ~12ms to ~8ms vs default system-negotiated interval
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096

CONFIG_USB_HID_POLL_INTERVAL_MS=1
